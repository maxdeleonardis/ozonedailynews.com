name: SEO Registry Sync

on:
  push:
    branches:
      - main
    paths:
      - 'app/**/page.tsx'        # triggers whenever a new or edited article is pushed
      - 'lib/content-registry.ts' # or when the registry itself changes
  schedule:
    # Every Monday at 6:00 AM UTC (safety net full-pass)
    - cron: '0 6 * * 1'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  sync:
    name: Sync Content Registry & Ping Search Engines
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run registry sync (dry-run report)
        run: npm run registry:sync

      - name: Apply registry sync
        run: npm run registry:write

      - name: Ping Google & Bing sitemaps
        run: npx tsx scripts/ping-google.ts
